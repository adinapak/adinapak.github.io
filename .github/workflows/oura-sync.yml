name: Oura Step Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-oura:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Oura daily activity and post to Supabase
        env:
          OURA_ACCESS_TOKEN: ${{ secrets.OURA_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          TODAY="$(TZ=America/Los_Angeles date +%F)"
          YESTERDAY="$(TZ=America/Los_Angeles date -d "yesterday" +%F)"
          NOW_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          ACTIVITY_RESPONSE_AND_STATUS="$(curl -sS \
            -w "\n%{http_code}" \
            -H "Authorization: Bearer ${OURA_ACCESS_TOKEN}" \
            "https://api.ouraring.com/v2/usercollection/daily_activity?start_date=${YESTERDAY}&end_date=${TODAY}")"

          ACTIVITY_STATUS="${ACTIVITY_RESPONSE_AND_STATUS##*$'\n'}"
          ACTIVITY_JSON="${ACTIVITY_RESPONSE_AND_STATUS%$'\n'*}"

          if ! [[ "$ACTIVITY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            echo "Oura daily_activity request failed with HTTP status: ${ACTIVITY_STATUS}"
            echo "Response body:"
            printf '%s\n' "$ACTIVITY_JSON"
            exit 1
          fi

          STEPS="$(printf '%s' "$ACTIVITY_JSON" | jq -r --arg today "$TODAY" '[.data[]? | select((.day // .date // .activity_date) == $today) | .steps // .contributors.steps // empty] | last // 0')"

          if [ "$STEPS" = "0" ]; then
            echo "Resolved steps is 0. Oura response shape debug:"
            printf '%s' "$ACTIVITY_JSON" | jq -c --arg today "$TODAY" '{
              today: $today,
              data_count: ((.data // []) | length),
              dates: [.data[]? | (.day // .date // .activity_date // "no-date")],
              latest: (.data[-1]? // {}),
              latest_keys: ((.data[-1]? // {}) | keys),
              latest_has_steps: ((.data[-1]? // {}) | has("steps")),
              latest_contributor_keys: ((.data[-1]?.contributors // {}) | keys),
              latest_contributor_steps: (.data[-1]?.contributors?.steps // null)
            }'
          fi

          if ! [[ "$STEPS" =~ ^[0-9]+$ ]]; then
            echo "Expected numeric step count, got: $STEPS"
            exit 1
          fi

          BODY="$(jq -nc \
            --arg date "$TODAY" \
            --arg occurred_at "$NOW_UTC" \
            --arg body "${STEPS} steps" \
            --argjson steps "$STEPS" \
            '{
              source: "oura",
              activity_date: $date,
              title: "Today’s steps",
              body: $body,
              icon: "steps",
              occurred_at: $occurred_at,
              visibility: "public",
              metadata: { steps: $steps, date: $date }
            }')"

          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/activity_feed?on_conflict=source,activity_date" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$BODY"
