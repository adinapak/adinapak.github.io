name: Oura Step Sync

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  sync-oura:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch today's Oura steps and upsert to Supabase
        env:
          OURA_ACCESS_TOKEN: ${{ secrets.OURA_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          TODAY="$(date -u +%F)"

          ACTIVITY_RESPONSE_AND_STATUS="$(curl -sS \
            -w "\n%{http_code}" \
            -H "Authorization: Bearer ${OURA_ACCESS_TOKEN}" \
            "https://api.ouraring.com/v2/usercollection/daily_activity?start_date=${TODAY}&end_date=${TODAY}")"; then
            echo "Oura daily_activity request failed before receiving a valid HTTP response."
            echo "Response body (if any):"
            cat "$ACTIVITY_RESPONSE_FILE"
            exit 1
          fi

          if ! [[ "$ACTIVITY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            echo "Oura daily_activity request failed with HTTP status: $ACTIVITY_STATUS"
            echo "Response body:"
            cat "$ACTIVITY_RESPONSE_FILE"
            exit 1
          fi

          ACTIVITY_JSON="$(cat "$ACTIVITY_RESPONSE_FILE")"

          if ! [[ "$ACTIVITY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            echo "Oura daily_activity request failed with HTTP status: $ACTIVITY_STATUS"
            echo "Response body:"
            cat "$ACTIVITY_RESPONSE_FILE"
            rm -f "$ACTIVITY_RESPONSE_FILE"
            exit 1
          fi

          ACTIVITY_JSON="$(cat "$ACTIVITY_RESPONSE_FILE")"
          rm -f "$ACTIVITY_RESPONSE_FILE"

          ACTIVITY_STATUS="${ACTIVITY_RESPONSE_AND_STATUS##*$'\n'}"
          ACTIVITY_JSON="${ACTIVITY_RESPONSE_AND_STATUS%$'\n'*}"

          if ! [[ "$ACTIVITY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            echo "Oura daily_activity request failed with HTTP status: $ACTIVITY_STATUS"
            echo "Response body:"
            printf '%s\n' "$ACTIVITY_JSON"
            exit 1
          fi

          ACTIVITY_STATUS="${ACTIVITY_RESPONSE_AND_STATUS##*$'\n'}"
          ACTIVITY_JSON="${ACTIVITY_RESPONSE_AND_STATUS%$'\n'*}"

          if ! [[ "$ACTIVITY_STATUS" =~ ^2[0-9][0-9]$ ]]; then
            echo "Oura daily_activity request failed with HTTP status: $ACTIVITY_STATUS"
            echo "Response body:"
            printf '%s\n' "$ACTIVITY_JSON"
            exit 1
          fi

          STEPS="$(printf '%s' "$ACTIVITY_JSON" | jq -r '.data[0].steps // 0')"

          if ! [[ "$STEPS" =~ ^[0-9]+$ ]]; then
            echo "Expected numeric step count, got: $STEPS"
            exit 1
          fi

          BODY="$(jq -nc \
            --arg date "$TODAY" \
            --arg body "${STEPS} steps" \
            --argjson steps "$STEPS" \
            '{
              source: "oura",
              title: "Today’s steps",
              body: $body,
              icon: "steps",
              visibility: "public",
              metadata: { steps: $steps, date: $date }
            }')"

          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/activity_feed" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$BODY"
