<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Adina Pak</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css">

  <style>
    body {
      font-family: "Computer Modern Serif","CMU Serif",Georgia,serif;
      background: #fdfdfd;
      color: #1a1a1a;
      line-height: 1.65;
      max-width: 680px;
      margin: 64px auto;
      padding: 0 24px 80px;
    }

    .queue-master-input-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.4rem;
    }

    .queue-master-input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 2px;
      padding: 0.38rem 0.45rem;
      font: inherit;
      font-size: 0.82rem;
    }

    .dj-queue-btn {
      border: none;
      background: #111;
      color: #fff;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 2px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<section class="dj-widget">
  <div class="queue-master">
    <div class="queue-master-controls">

      <!-- UPDATED ROW -->
      <div class="queue-master-input-row">
        <button id="queue-login-btn" class="dj-queue-btn" type="button">
          Connect Spotify
        </button>
        <input id="queue-search-input"
               class="queue-master-input"
               type="search"
               placeholder="Search any song">
      </div>

      <div id="queue-results" class="queue-master-results"></div>
    </div>
  </div>
</section>

<script>
  const queueSearchInput = document.getElementById('queue-search-input');
  const queueLoginBtn = document.getElementById('queue-login-btn');
  const queueResultsEl = document.getElementById('queue-results');

  async function searchTracks() {
    const query = queueSearchInput.value.trim();
    if (!query) return;

    console.log("Searching:", query);
    // your existing Spotify search logic here
  }

  queueLoginBtn.addEventListener('click', function () {
    console.log("Connect Spotify clicked");
    // your existing auth logic
  });

  queueSearchInput.addEventListener('keydown', function (event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      searchTracks();
    }
  });
</script>

</body>
</html>
