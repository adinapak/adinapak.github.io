  <section class="dj-widget" aria-live="polite">
    <h3>Tune In!</h3>
    <img id="dj-album-art" class="dj-cover" alt="Current album art" src="" hidden>
    <p id="dj-track">Loading now playing…</p>
    <p id="dj-artist"></p>
    <progress id="dj-progress" class="dj-progress" max="1" value="0"></progress>
    <div class="dj-times">
      <span id="dj-elapsed">0:00</span>
      <span id="dj-duration">0:00</span>
    </div>
  </section>

  <script>
    (function () {
      const albumArtEl = document.getElementById('dj-album-art');
      const trackEl = document.getElementById('dj-track');
      const artistEl = document.getElementById('dj-artist');
      const progressEl = document.getElementById('dj-progress');
      const elapsedEl = document.getElementById('dj-elapsed');
      const durationEl = document.getElementById('dj-duration');

      let progressMs = 0;
      let durationMs = 1;
      let isPlaying = false;
      let tickInterval = null;

      function formatMs(ms) {
        const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${String(seconds).padStart(2, '0')}`;
      }

      function renderProgress() {
        progressEl.max = durationMs || 1;
        progressEl.value = Math.min(progressMs, durationMs || 1);
        elapsedEl.textContent = formatMs(progressMs);
        durationEl.textContent = formatMs(durationMs);
      }

      function startTicking() {
        if (tickInterval) clearInterval(tickInterval);

        tickInterval = setInterval(function () {
          if (!isPlaying) return;
          progressMs = Math.min(progressMs + 1000, durationMs || progressMs + 1000);
          renderProgress();
        }, 1000);
      }

      function setIdleState(message) {
        isPlaying = false;
        progressMs = 0;
        durationMs = 1;
        trackEl.textContent = message;
        artistEl.textContent = '';
        albumArtEl.hidden = true;
        albumArtEl.src = '';
        renderProgress();
      }

      async function fetchNowPlaying() {
        try {
          const response = await fetch('/api/now-playing', { cache: 'no-store' });
          const data = await response.json();

          if (!response.ok) {
            setIdleState('Unable to load playback right now.');
            return;
          }

          if (!data.track) {
            setIdleState('Nothing is currently playing.');
            return;
          }

          isPlaying = !!data.is_playing;
          progressMs = Number(data.progress_ms || 0);
          durationMs = Number(data.duration_ms || 1);

          trackEl.textContent = data.track.name || 'Unknown track';
          artistEl.textContent = data.track.artist || '';

          if (data.track.album_art_url) {
            albumArtEl.src = data.track.album_art_url;
            albumArtEl.hidden = false;
          } else {
            albumArtEl.hidden = true;
            albumArtEl.src = '';
          }

          renderProgress();
        } catch (error) {
          setIdleState('Unable to reach now playing endpoint.');
        }
      }

      fetchNowPlaying();
      setInterval(fetchNowPlaying, 10000);
      startTicking();
    })();
  </script>
