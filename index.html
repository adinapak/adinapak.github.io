  <style>
    .dj-widget {
      margin-top: 1rem;
      border: 1px solid #d9d9d9;
      border-radius: 16px;
      background: #fff;
      padding: 10px;
      max-width: 560px;
    }

    .dj-now-playing {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 56px;
    }

    .dj-cover-btn {
      border: 0;
      background: transparent;
      padding: 0;
      width: 56px;
      height: 56px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
    }

    .dj-cover {
      width: 56px;
      height: 56px;
      object-fit: cover;
      display: block;
      background: #ececec;
    }

    .dj-track-wrap {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .dj-track,
    .dj-artist {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dj-track { font-size: 0.95rem; font-weight: 600; }
    .dj-artist { font-size: 0.82rem; color: #505050; }

    .dj-actions { display: flex; align-items: center; gap: 8px; }

    .dj-love-btn,
    .dj-login-btn {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.76rem;
      line-height: 1;
      min-height: 32px;
      touch-action: manipulation;
    }

    .dj-login-btn {
      border: 1px solid #0a7a33;
      background: #1db954;
      color: #fff;
    }

    .dj-progress {
      width: 100%;
      margin-top: 8px;
      height: 4px;
    }

    .dj-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
      min-height: 18px;
    }

    .dj-status {
      min-height: 20px;
      font-size: 0.8rem;
      color: #333;
      margin: 6px 0 0;
    }

    .surprise-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(30,215,96,0.35), rgba(0,0,0,0.6));
      color: #fff;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      text-align: center;
      padding: 2rem;
      animation: flashIn 250ms ease-out;
    }

    .surprise-overlay.show { display: flex; }

    @keyframes flashIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>

  <section class="dj-widget" aria-live="polite">
    <h3>Tune In!</h3>
    <div class="dj-now-playing">
      <button id="dj-album-btn" class="dj-cover-btn" type="button" aria-label="Queue current track">
        <img id="dj-album-art" class="dj-cover" alt="Current album art" src="" hidden>
      </button>

        <button id="dj-love-btn" class="dj-love-btn" type="button">I love it!</button>

      </div>

    <progress id="dj-progress" class="dj-progress" max="1" value="0"></progress>
    <div class="dj-times">
      <span id="dj-elapsed">0:00</span>

  <div id="surpriseOverlay" class="surprise-overlay" aria-hidden="true">
    🎉 Surprise unlocked — that track is from my liked list.
  </div>

  <script>
    (function () {
      const albumArtEl = document.getElementById('dj-album-art');
      const albumBtnEl = document.getElementById('dj-album-btn');
      const trackEl = document.getElementById('dj-track');
      const artistEl = document.getElementById('dj-artist');
      const progressEl = document.getElementById('dj-progress');
      const elapsedEl = document.getElementById('dj-elapsed');
      const durationEl = document.getElementById('dj-duration');
      const loveBtnEl = document.getElementById('dj-love-btn');
      const loginBtnEl = document.getElementById('dj-login-btn');
      const statusEl = document.getElementById('dj-status');
      const surpriseOverlay = document.getElementById('surpriseOverlay');

      const SPOTIFY_TOKEN_KEY = 'spotifyUserTokenV2';
      const SPOTIFY_VERIFIER_KEY = 'spotifyCodeVerifierV2';
      const SPOTIFY_SCOPES = [
        'user-read-private',
        'user-read-playback-state',
        'user-modify-playback-state',
        'user-library-modify'
      ];
      const SURPRISE_SOURCE_TRACK_IDS = new Set([
        '6habFhsOp2NvshLv26DqMb',
        '0VjIjW4GlUZAMYd2vXMi3b',
        '7qiZfU4dY1lWllzX7mPBI3'
      ]);

      let spotifyClientId = '';
      let currentTrack = null;
      let progressMs = 0;
      let durationMs = 1;
      let isPlaying = false;
      let tickInterval = null;
      let fetchInterval = null;
      let lastTapAt = 0;

      function setStatus(message) {
        statusEl.textContent = message || '';
      }

      function formatMs(ms) {
        const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${String(seconds).padStart(2, '0')}`;
      }

      function renderProgress() {
        progressEl.max = durationMs || 1;
        progressEl.value = Math.min(progressMs, durationMs || 1);
        elapsedEl.textContent = formatMs(progressMs);
        durationEl.textContent = formatMs(durationMs);
      }

      function startTicking() {
        if (tickInterval) clearInterval(tickInterval);

        tickInterval = setInterval(function () {
          if (!isPlaying) return;
          progressMs = Math.min(progressMs + 1000, durationMs || progressMs + 1000);
          renderProgress();
        }, 1000);
      }

      function setIdleState(message) {
        isPlaying = false;
        progressMs = 0;
        durationMs = 1;
        currentTrack = null;
        trackEl.textContent = message;
        artistEl.textContent = '';
        albumArtEl.hidden = true;
        albumArtEl.src = '';
        renderProgress();
      }

      function randomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let output = '';
        const randomValues = new Uint8Array(length);
        window.crypto.getRandomValues(randomValues);
        randomValues.forEach((value) => {
          output += chars[value % chars.length];
        });
        return output;
      }

      async function sha256(plain) {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return window.crypto.subtle.digest('SHA-256', data);
      }

      function base64UrlEncode(buffer) {
        const bytes = new Uint8Array(buffer);
        let str = '';
        bytes.forEach((byte) => {
          str += String.fromCharCode(byte);
        });
        return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      }

      async function generateCodeChallenge(codeVerifier) {
        const hashed = await sha256(codeVerifier);
        return base64UrlEncode(hashed);
      }

      function spotifyRedirectUri() {
        return `${window.location.origin}${window.location.pathname}`;
      }

      function loadSpotifyToken() {
        try {
          const raw = localStorage.getItem(SPOTIFY_TOKEN_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      function saveSpotifyToken(token) {
        localStorage.setItem(SPOTIFY_TOKEN_KEY, JSON.stringify(token));
      }

      function clearSpotifyToken() {
        localStorage.removeItem(SPOTIFY_TOKEN_KEY);
      }

      async function fetchSpotifyClientId() {
        const response = await fetch('/api/spotify-client', { cache: 'no-store' });
        if (!response.ok) throw new Error('Spotify auth config unavailable.');
        const data = await response.json();
        if (!data.client_id) throw new Error('Missing Spotify client id.');
        return data.client_id;
      }

      async function refreshSpotifyTokenIfNeeded() {
        const token = loadSpotifyToken();
        if (!token) return null;

        const now = Date.now();
        if (token.expires_at && now < token.expires_at - 60_000) return token.access_token;
        if (!token.refresh_token || !spotifyClientId) {
          clearSpotifyToken();
          return null;
        }

        const payload = new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: token.refresh_token,
          client_id: spotifyClientId
        });

        const response = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: payload.toString()
        });

        if (!response.ok) {
          clearSpotifyToken();
          return null;
        }

        const data = await response.json();
        const updated = {
          access_token: data.access_token,
          refresh_token: data.refresh_token || token.refresh_token,
          expires_at: Date.now() + (Number(data.expires_in || 0) * 1000)
        };
        saveSpotifyToken(updated);
        return updated.access_token;
      }

      async function beginSpotifyAuth() {
        if (!spotifyClientId) {
          spotifyClientId = await fetchSpotifyClientId();
        }

        const codeVerifier = randomString(96);
        const codeChallenge = await generateCodeChallenge(codeVerifier);
        sessionStorage.setItem(SPOTIFY_VERIFIER_KEY, codeVerifier);

        const params = new URLSearchParams({
          response_type: 'code',
          client_id: spotifyClientId,
          scope: SPOTIFY_SCOPES.join(' '),
          redirect_uri: spotifyRedirectUri(),
          code_challenge_method: 'S256',
          code_challenge: codeChallenge
        });

        window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
      }

      async function completeSpotifyAuthIfNeeded() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (error) {
          setStatus(`Spotify login failed: ${error}`);
          return;
        }

        if (!code) return;

        const verifier = sessionStorage.getItem(SPOTIFY_VERIFIER_KEY);
        if (!verifier) {
          setStatus('Spotify auth verifier missing. Please log in again.');
          return;
        }

        if (!spotifyClientId) {
          spotifyClientId = await fetchSpotifyClientId();
        }

        const payload = new URLSearchParams({
          grant_type: 'authorization_code',
          code,
          redirect_uri: spotifyRedirectUri(),
          client_id: spotifyClientId,
          code_verifier: verifier
        });

        const response = await fetch('https://accounts.spotify.com/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: payload.toString()
        });

        if (!response.ok) {
          setStatus('Spotify token exchange failed.');
          return;
        }

        const data = await response.json();
        saveSpotifyToken({
          access_token: data.access_token,
          refresh_token: data.refresh_token,
          expires_at: Date.now() + (Number(data.expires_in || 0) * 1000)
        });

        sessionStorage.removeItem(SPOTIFY_VERIFIER_KEY);
        window.history.replaceState({}, document.title, spotifyRedirectUri());
        setStatus('Spotify connected.');
      }

      async function spotifyApi(path, init = {}) {
        const accessToken = await refreshSpotifyTokenIfNeeded();
        if (!accessToken) {
          const authError = new Error('Spotify login required.');
          authError.code = 'NO_AUTH';
          throw authError;
        }

        const response = await fetch(`https://api.spotify.com${path}`, {
          ...init,
          headers: {
            ...(init.headers || {}),
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.status === 204) return null;

        if (!response.ok) {
          let detail = '';
          try {
            const body = await response.json();
            detail = body.error?.message || '';
          } catch {
            detail = '';
          }

          const err = new Error(detail || `Spotify API error (${response.status})`);
          err.code = response.status;
          throw err;
        }

        return response.json();
      }

      function maybeShowSurprise(trackId) {
        if (!trackId || !SURPRISE_SOURCE_TRACK_IDS.has(trackId)) return;

        surpriseOverlay.classList.add('show');
        surpriseOverlay.setAttribute('aria-hidden', 'false');
        window.setTimeout(() => {
          surpriseOverlay.classList.remove('show');
          surpriseOverlay.setAttribute('aria-hidden', 'true');
        }, 1800);
      }

      async function withSpotifyAuth(action) {
        try {
          await action();
        } catch (error) {
          if (error.code === 'NO_AUTH') {
            setStatus('Logging in to Spotify…');
            await beginSpotifyAuth();
            return;
          }

          if (error.code === 401) {
            clearSpotifyToken();
            setStatus('Session expired. Please log in to Spotify again.');
            return;
          }

          if (error.code === 403 || String(error.message || '').toLowerCase().includes('active device')) {
            setStatus('Open Spotify on a device, start playback, then try again.');
            return;
          }

          setStatus(error.message || 'Spotify action failed.');
        }
      }

      async function queueCurrentTrack() {
        if (!currentTrack?.uri) {
          setStatus('No active track to queue right now.');
          return;
        }

        await withSpotifyAuth(async () => {
          const encoded = encodeURIComponent(currentTrack.uri);
          await spotifyApi(`/v1/me/player/queue?uri=${encoded}`, { method: 'POST' });
          maybeShowSurprise(currentTrack.id);
          setStatus('Queued current track to your Spotify device.');
        });
      }

      async function likeCurrentTrack() {
        if (!currentTrack?.id) {
          setStatus('No active track to like right now.');
          return;
        }

        await withSpotifyAuth(async () => {
          await spotifyApi(`/v1/me/tracks?ids=${encodeURIComponent(currentTrack.id)}`, {
            method: 'PUT',
            body: JSON.stringify({ ids: [currentTrack.id] })
          });
          setStatus('Added to your Liked Songs.');
        });
      }

      async function fetchNowPlaying() {
        try {
          const response = await fetch('/api/now-playing', { cache: 'no-store' });
          const data = await response.json();

          if (!response.ok) {
            setIdleState('Unable to load playback right now.');
            return;
          }

          if (!data.track) {
            setIdleState('Nothing is currently playing.');
            return;
          }

          isPlaying = !!data.is_playing;
          progressMs = Number(data.progress_ms || 0);
          durationMs = Number(data.duration_ms || 1);

          trackEl.textContent = data.track.name || 'Unknown track';
          artistEl.textContent = data.track.artist || '';
          currentTrack = {
            id: data.track.id || '',
            uri: data.track.uri || '',
            name: data.track.name || ''
          };

          if (data.track.album_art_url) {
            albumArtEl.src = data.track.album_art_url;
            albumArtEl.hidden = false;
          } else {
            albumArtEl.hidden = true;
            albumArtEl.src = '';
          }

          renderProgress();
        } catch (error) {
          setIdleState('Unable to reach now playing endpoint.');
        }
      }

      function bindAlbumInteractions() {
        albumBtnEl.addEventListener('dblclick', function (event) {
          event.preventDefault();
          queueCurrentTrack();
        });

        albumBtnEl.addEventListener('touchend', function () {
          const now = Date.now();
          if (now - lastTapAt < 350) {
            queueCurrentTrack();
            lastTapAt = 0;
            return;
          }
          lastTapAt = now;
        }, { passive: true });
      }

      loginBtnEl.addEventListener('click', function () {
        withSpotifyAuth(async function () {
          setStatus('Already connected to Spotify.');
        });
      });

      loveBtnEl.addEventListener('click', function () {
        likeCurrentTrack();
      });

      bindAlbumInteractions();

      (async function init() {
        try {
          spotifyClientId = await fetchSpotifyClientId();
        } catch (error) {
          setStatus('Spotify user actions unavailable until client id is configured.');
        }

        await completeSpotifyAuthIfNeeded();
        await fetchNowPlaying();
        renderProgress();
        startTicking();

        if (fetchInterval) clearInterval(fetchInterval);
        fetchInterval = setInterval(fetchNowPlaying, 10000);
      })();
    })();
  </script>
